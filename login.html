<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechNova — Iniciar sesión</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/login.css" />
  <script src="js/modo.js"></script>

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">
   <button class="login-tema-btn" id="btn-tema-login">🌙 Modo oscuro</button>
  <div class="login-box">

    <span class="login-logo">TechNova</span>

    <h1>Iniciar sesión</h1>
    <p>Ingresa tus credenciales para continuar</p>

    <form id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="input-usuario">Usuario</label>
        <input
          type="text"
          id="input-usuario"
          class="form-input"
          placeholder="Tu nombre de usuario"
          autocomplete="username"
        />
        <span class="form-error" id="error-usuario"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-contrasena">Contraseña</label>
        <input
          type="password"
          id="input-contrasena"
          class="form-input"
          placeholder="Tu contraseña"
          autocomplete="current-password"
        />
        <span class="form-error" id="error-contrasena"></span>
      </div>

      <div class="form-alert" id="login-alert" role="alert" aria-live="polite"></div>

      <button type="submit" class="btn-login" id="btn-ingresar">
        Ingresar
      </button>

    </form>

    <p class="login-hint">
      Demo: usuario <code>admin</code> / contraseña <code>technova2024</code>
    </p>

  </div>

  <script src="js/login.js"></script>
  <script>
    vincularToggleTema('btn-tema-login');
  </script>
</body>
</html>

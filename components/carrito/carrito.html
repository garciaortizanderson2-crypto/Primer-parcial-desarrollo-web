<div id="carrito-panel">
  <div class="carrito-header">
    <strong>Carrito</strong>
    <button type="button" id="btn-cerrar-carrito">✕ Cerrar</button>
  </div>
  <div id="carrito-items" class="carrito-items">
    <p class="carrito-vacio">El carrito está vacío.</p>
  </div>
  <div class="carrito-footer">
    <div class="carrito-total-row">
      <span>Total:</span>
      <span id="carrito-total">$ 0</span>
    </div>
    <button type="button" class="btn-checkout">Finalizar compra</button>
  </div>
</div>

<div id="carrito-overlay"></div>
